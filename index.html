<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino Globo Oficial VIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --oro: #d4af37; --oro-brillante: #f9f295; --fondo: #0c0e12; }
        body { background: var(--fondo); color: white; font-family: 'Roboto', sans-serif; margin: 0; overflow: hidden; height: 100vh; }
        
        /* Contenedores de Secciones */
        .seccion { display: none; height: 100vh; width: 100%; flex-direction: column; align-items: center; justify-content: center; position: absolute; top: 0; left: 0; }
        .activa { display: flex; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 1. SECCIÓN REGISTRO */
        .logo-casino { font-family: 'Bebas Neue'; font-size: 3.5em; color: var(--oro); text-shadow: 0 0 15px rgba(212,175,55,0.5); margin-bottom: 10px; }
        .card-registro { background: #1a1d24; border: 1px solid #333; padding: 40px 30px; border-radius: 20px; box-shadow: 0 10px 50px rgba(0,0,0,0.7); width: 85%; max-width: 350px; text-align: center; }
        input { width: 100%; padding: 15px; margin: 10px 0; background: #07080a; border: 1px solid var(--oro); border-radius: 10px; color: white; box-sizing: border-box; font-size: 16px; }
        .btn-principal { background: linear-gradient(135deg, var(--oro), var(--oro-brillante), var(--oro)); border: none; padding: 18px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 15px; font-size: 1.1em; }

        /* 2. PANTALLA DE CARGA */
        .loader { border: 5px solid #222; border-top: 5px solid var(--oro); border-radius: 50%; width: 60px; height: 60px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .progreso-txt { margin-top: 20px; font-family: 'Bebas Neue'; letter-spacing: 2px; color: var(--oro); }

        /* 3. SECCIÓN JUEGO */
        .interfaz-juego { width: 100%; position: absolute; top: 0; padding: 20px; box-sizing: border-box; display: flex; justify-content: space-between; background: rgba(0,0,0,0.5); border-bottom: 1px solid var(--oro); }
        #saldo-txt { color: #00ff00; font-weight: bold; font-size: 1.4em; }
        .globo-game { width: 180px; height: 180px; background: radial-gradient(circle at 30% 30%, #ff4d4d, #900); border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%; cursor: pointer; transition: transform 0.1s; box-shadow: 0 10px 30px rgba(255,0,0,0.5); }
        #multi-txt { font-size: 3em; font-family: 'Bebas Neue'; color: var(--oro); margin-top: 20px; }
    </style>
</head>
<body>

    <div id="paso-registro" class="seccion activa">
        <h1 class="logo-casino">CASINO GLOBO VIP</h1>
        <div class="card-registro">
            <h2 style="margin-top:0; font-size: 1.2em; color: #888;">INICIAR SESIÓN</h2>
            <input type="text" id="u" placeholder="Usuario / Correo">
            <input type="password" id="p" placeholder="Contraseña">
            <button class="btn-principal" onclick="irACarga()">ENTRAR AL CASINO</button>
        </div>
    </div>

    <div id="paso-carga" class="seccion">
        <div class="loader"></div>
        <p class="progreso-txt" id="estado-carga">CONECTANDO AL SERVIDOR...</p>
    </div>

    <div id="paso-juego" class="seccion">
        <div class="interfaz-juego">
            <span style="font-family: 'Bebas Neue'; color: var(--oro);">VIP PLAYER</span>
            <span id="saldo-txt">$<span id="val-s">0.00</span></span>
        </div>
        
        <div id="globo" class="globo-game" onclick="inflar()"></div>
        <div id="multi-txt">x1.00</div>
        <p id="hint" style="color: #666;">¡Toca el globo para multiplicar!</p>
        
        <button class="btn-principal" style="width: 200px;" onclick="location.reload()">COBRAR Y SALIR</button>
    </div>

    <script>
        let s = 0; let m = 1.0; let c = 0;

        function irACarga() {
            // Validar que no estén vacíos
            if(document.getElementById('u').value == "" || document.getElementById('p').value == "") {
                alert("Por favor ingrese sus datos"); return;
            }
            
            // Cambiar de sección
            document.getElementById('paso-registro').classList.remove('activa');
            document.getElementById('paso-carga').classList.add('activa');

            // Simular carga profesional
            let estados = ["VERIFICANDO CUENTA...", "CARGANDO MOTOR GRÁFICO...", "SINCRONIZANDO SALDO...", "¡LISTO!"];
            let i = 0;
            let intervalo = setInterval(() => {
                document.getElementById('estado-carga').innerText = estados[i];
                i++;
                if(i >= estados.length) {
                    clearInterval(intervalo);
                    setTimeout(iniciarJuego, 500);
                }
            }, 1000);
        }

        function iniciarJuego() {
            document.getElementById('paso-carga').classList.remove('activa');
            document.getElementById('paso-juego').classList.add('activa');
        }

        function inflar() {
            c++;
            m += 0.25;
            let esc = 1 + (c * 0.1);
            document.getElementById('globo').style.transform = `scale(${esc})`;
            document.getElementById('multi-txt').innerText = "x" + m.toFixed(2);

            // Probabilidad de explosión real
            if(Math.random() < (c * 0.05) && c > 5) {
                document.getElementById('globo').style.transform = "scale(0)";
                alert("¡BOOM! El globo explotó. Suerte la próxima.");
                location.reload();
            }
        }
    </script>
</body>
</html>
