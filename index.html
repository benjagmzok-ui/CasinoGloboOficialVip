<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLOBO VIP</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; text-align: center; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .caja { background: #111; padding: 30px; border-radius: 20px; border: 1px solid #d4af37; width: 90%; max-width: 350px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; }
        .btn { background: linear-gradient(135deg, #d4af37, #f9f295); color: black; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="caja" id="login-box">
        <h1 style="color:#d4af37">GLOBO VIP</h1>
        <input type="text" id="user" placeholder="Nombre de Usuario">
        <button class="btn" onclick="registrarYEntrar()">ACCEDER AHORA</button>
    </div>

    <div id="juego" style="display:none">
        <h2 id="saludo"></h2>
        <div style="font-size: 2rem; color: #00ff00;">SALDO: $<span id="saldo-jugador">0</span></div>
    </div>

    <script>
        // Tu configuración que ya funciona
        const firebaseConfig = {
            apiKey: "AIzaSyADFLPl2MSMaIygi80cXERqpOx86PBVpgs",
            authDomain: "casino-globo.firebaseapp.com",
            databaseURL: "https://casino-globo-default-rtdb.firebaseio.com",
            projectId: "casino-globo",
            storageBucket: "casino-globo.firebasestorage.app",
            messagingSenderId: "522798413276",
            appId: "1:522798413276:web:0ec75ba59c8769a51b0b19"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function registrarYEntrar() {
            const nombre = document.getElementById('user').value.trim();
            if(!nombre) return alert("Escribe un nombre");

            // ESTA ES LA PARTE QUE FALTA: Guarda el usuario en la base de datos
            db.ref('usuarios/' + nombre).once('value', (snapshot) => {
                if(!snapshot.exists()) {
                    // Si el usuario no existe, lo crea con saldo 0
                    db.ref('usuarios/' + nombre).set({
                        saldo: 0,
                        registrado: new Date().getTime()
                    });
                }
                
                // Escuchar el saldo en tiempo real para que vea cuando tú le cargues
                db.ref('usuarios/' + nombre + '/saldo').on('value', (s) => {
                    document.getElementById('saldo-jugador').innerText = s.val() || 0;
                });

                // Cambiar pantalla
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('juego').style.display = 'block';
                document.getElementById('saludo').innerText = "Bienvenido, " + nombre;
            });
        }
    </script>
</body>
</html>
