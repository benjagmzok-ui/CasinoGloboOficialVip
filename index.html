<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GLOBO VIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --oro: linear-gradient(135deg, #d4af37 0%, #f9f295 50%, #d4af37 100%); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #050505; color: white; font-family: 'Poppins', sans-serif; margin: 0; overflow: hidden; }

        .seccion { display: none; min-height: 100vh; width: 100%; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .visible { display: flex; }

        /* Login */
        .caja { background: #111; border: 1px solid #222; padding: 40px 25px; border-radius: 25px; width: 100%; max-width: 380px; text-align: center; }
        .caja h1 { font-family: 'Bebas Neue'; font-size: 3.5rem; margin: 0; background: var(--oro); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        input { width: 100%; padding: 15px; margin: 10px 0; background: #000; border: 1px solid #333; border-radius: 12px; color: white; font-size: 1rem; }

        /* Botón */
        .btn { background: var(--oro); color: black; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 1rem; }
        .btn:active { transform: scale(0.96); }

        .seguridad { color: #00ff00; font-size: 0.75rem; margin-top: 20px; font-weight: bold; }

        /* Carga */
        .loader { width: 45px; height: 45px; border: 4px solid #111; border-top: 4px solid #d4af37; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Menú */
        header { width: 100%; display: flex; justify-content: space-between; padding: 15px 20px; background: #000; border-bottom: 1px solid #222; position: fixed; top: 0; }
        .globo { width: 150px; height: 180px; background: radial-gradient(circle at 30% 30%, #ff4d4d, #800); border-radius: 50% 50% 50% 50% / 45% 45% 55% 55%; margin: 20px auto; }
    </
