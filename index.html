<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino Globo Oficial VIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --oro: #d4af37; --oro-brillante: #f9f295; --fondo: #0c0e12; --rojo-casino: #b30000; }
        body { background: var(--fondo); color: white; font-family: 'Roboto', sans-serif; margin: 0; overflow: hidden; height: 100vh; }
        
        /* Contenedores de Secciones */
        .seccion { display: none; height: 100vh; width: 100%; flex-direction: column; align-items: center; justify-content: center; position: absolute; top: 0; left: 0; }
        .activa { display: flex; animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* HEADER VIP */
        .casino-header { width: 100%; position: absolute; top: 0; padding: 15px 20px; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.8); border-bottom: 2px solid var(--oro); z-index: 10; }
        .logo-small { font-family: 'Bebas Neue'; font-size: 1.8em; color: var(--oro); margin: 0; }
        .saldo-box { background: rgba(0,255,0,0.1); padding: 5px 15px; border-radius: 20px; border: 1px solid #00ff00; color: #00ff00; font-weight: bold; }

        /* 1. REGISTRO PROFESIONAL */
        .card-auth { background: #161920; border: 1px solid #2a2e38; padding: 35px 25px; border-radius: 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.9); width: 88%; max-width: 360px; text-align: center; }
        h2.gold-title { font-family: 'Bebas Neue'; font-size: 2.5em; color: var(--oro); margin-bottom: 25px; letter-spacing: 1px; }
        input { width: 100%; padding: 16px; margin: 12px 0; background: #0a0c10; border: 1px solid #3d424d; border-radius: 12px; color: white; box-sizing: border-box; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: var(--oro); outline: none; box-shadow: 0 0 10px rgba(212,175,55,0.3); }
        .btn-gold { background: linear-gradient(135deg, var(--oro), var(--oro-brillante), var(--oro)); color: #000; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-top: 10px; font-size: 1.1em; transition: 0.2s; }
        .btn-gold:active { transform: scale(0.98); }

        /* 2. PANTALLA DE CARGA VIP */
        .loader-container { text-align: center; }
        .vip-spinner { width: 70px; height: 70px; border: 4px solid rgba(212,175,55,0.1); border-top: 4px solid var(--oro); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* 3. MENÚ DE JUEGOS */
        .game-selector { display: grid; gap: 20px; width: 90%; max-width: 400px; }
        .game-card { background: linear-gradient(to bottom, #1e222d, #11141b); border: 1px solid var(--oro); border-radius: 20px; padding: 25px; text-align: center; cursor: pointer; transition: 0.3s; position: relative; overflow: hidden; }
        .game-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(212,175,55,0.2); }
        .game-card h3 { margin: 0; font-family: 'Bebas Neue'; font-size: 2.2em; color: var(--oro); }

        /* 4. JUEGO DEL GLOBO */
        .area-juego { text-align: center; padding-top: 80px; }
        .globo-container { width: 200px; height: 200px; margin: 40px auto; display: flex; align-items: center; justify-content: center; position: relative; }
        .globo-img { width: 150px; height: 180px; background: radial-gradient(circle at 35% 30%, #ff5e5e 0%, var(--rojo-casino) 70%, #600 100%); border-radius: 50% 50% 50% 50% / 45% 45% 60% 60%; box-shadow: 0 20px 40px rgba(0,0,0,0.6), inset -10px -10px 30px rgba(0,0,0,0.5); cursor: pointer; transition: transform 0.1s cubic-bezier(0.17, 0.67, 0.83, 0.67); }
        .multiplicador-display { font-family: 'Bebas Neue'; font-size: 4em; color: var(--oro); text-shadow: 0 0 20px rgba(212,175,55,0.4); margin: 10px 0; }

        /* MODAL PROFESIONAL (Cartel de error/suerte) */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; backdrop-filter: blur(5px); }
        .modal-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1d24; border: 2px solid var(--oro); padding: 30px; border-radius: 20px; text-align: center; width: 80%; max-width: 320px; box-shadow: 0 0 50px rgba(212,175,55,0.2); }
    </style>
</head>
<body>

    <div id="pantalla-registro" class="seccion activa">
        <div class="card-auth">
            <h1 class="logo-small" style="font-size: 3em; margin-bottom: 5px;">GLOBO VIP</h1>
            <p style="color: #666; margin-bottom: 25px;">Únete a la élite del azar</p>
            <h2 class="gold-title">CREAR CUENTA</h2>
            <input type="text" id="reg-user" placeholder="Nombre de usuario">
            <input type="password" id="reg-pass" placeholder="Contraseña de retiro">
            <button class="btn-gold" onclick="procesoCarga()">REGISTRARME AHORA</button>
        </div>
    </div>
