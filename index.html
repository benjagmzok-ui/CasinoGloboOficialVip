<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLOBO VIP - Élite Casino</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: linear-gradient(135deg, #d4af37 0%, #f9f295 50%, #d4af37 100%); --dark-bg: #050505; --card-bg: #111111; --border: #222; }
        * { box-sizing: border-box; }
        body { background-color: var(--dark-bg); color: white; font-family: 'Poppins', sans-serif; margin: 0; overflow-x: hidden; }

        .screen { display: none; min-height: 100vh; width: 100%; flex-direction: column; align-items: center; padding: 20px; }
        .active { display: flex; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        header { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.9); position: sticky; top: 0; z-index: 100; }
        .logo { font-family: 'Bebas Neue'; font-size: 1.8rem; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .balance-pill { background: #002200; border: 1px solid #00ff00; color: #00ff00; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; }

        .auth-card { background: var(--card-bg); border: 1px solid var(--border); padding: 40px 30px; border-radius: 30px; width: 100%; max-width: 400px; text-align: center; margin-top: 50px; }
        .auth-card h1 { font-family: 'Bebas Neue'; font-size: 3.5rem; margin: 0; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        input { width: 100%; padding: 15px; margin: 10px 0; background: #000; border: 1px solid var(--border); border-radius: 12px; color: white; font-size: 1rem; }
        .btn-main { background: var(--gold); color: black; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-top: 15px; transition: 0.3s; }

        .loader-container { text-align: center; margin-top: 30vh; }
        .spinner { width: 60px; height: 60px; border: 4px solid #111; border-top: 4px solid #d4af37; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-text { font-family: 'Bebas Neue'; font-size: 1.5rem; color: #d4af37; letter-spacing: 2px; }

        .game-card { background: linear-gradient(to bottom, #1a1a1a, #000); border: 1px solid var(--border); border-radius: 25px; padding: 30px 20px; width: 100%; max-width: 350px; text-align: center; border-bottom: 4px solid #d4af37; }
        
        .security-box { margin-top: 30px; background: rgba(255,255,255,0.03); border: 1px solid #222; padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; }
        .min-badge { background: #d4af37; color: black; padding: 2px 10px; border-radius: 5px; font-weight: bold; font-size: 0.8rem; margin-bottom: 10px; display: inline-block; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 2000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: var(--card-bg); border: 1px solid #d4af37; padding: 35px; border-radius: 25px; width: 100%; max-width: 350px; text-align: center; box-shadow: 0 0 30px rgba(212,175,55,0.2); }
    </style>
</head>
<body>

        <div class="auth-card">
            <h1>GLOBO VIP</h1>
            <p style="color: #888;">Acceso Exclusivo</p>
            <input type="text" id="username" placeholder="Nombre de Usuario">
            <input type="password" placeholder="Contraseña">
            <button class="btn-main" onclick="startLoading('CONECTANDO AL SERVIDOR...')">ACCEDER AHORA</button>
            <p style="font-size: 0.7rem; color: #444; margin-top: 15px;">PROTECCIÓN DE DATOS NIVEL BANCARIO</p>
        </div>
    </div>

    <div id="screen-loading" class="screen">
        <div class="loader-container">
            <div class="spinner"></div>
            <div class="loader-text" id="load-msg">CARGANDO...</div>
        </div>
    </div>
