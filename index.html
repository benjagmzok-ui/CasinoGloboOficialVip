<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino Globo Oficial VIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Estilo General - Lujo */
        body { background: radial-gradient(circle, #1a1c23 0%, #07080a 100%); color: #fff; font-family: 'Roboto', sans-serif; margin: 0; min-height: 100vh; overflow-x: hidden; }
        
        /* Cabecera Profesional */
        .casino-header { background: rgba(0,0,0,0.8); padding: 25px; border-bottom: 2px solid #d4af37; box-shadow: 0 5px 20px rgba(212,175,55,0.4); }
        .casino-title { font-family: 'Bebas Neue', cursive; font-size: 3.2em; color: #d4af37; margin: 0; letter-spacing: 2px; }
        .saldo-display { color: #00ff00; font-size: 1.5em; font-weight: bold; margin-top: 5px; text-shadow: 0 0 10px rgba(0,255,0,0.3); }

        /* El Globo VIP */
        .game-area { padding: 40px 20px; }
        .globo-wrapper { width: 160px; height: 160px; margin: 0 auto; cursor: pointer; transition: transform 0.1s ease-out; position: relative; }
        .globo-diseno { width: 100%; height: 100%; background: radial-gradient(circle at 30% 30%, #ff4d4d, #b30000); border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%; box-shadow: 0 15px 35px rgba(255,0,0,0.4), inset -10px -10px 20px rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.1); }
        
        /* Mensajes de Juego */
        #msg-juego { color: #d4af37; font-size: 1.4em; margin-top: 20px; font-weight: bold; text-transform: uppercase; }

        /* Formulario de Registro Profesional */
        .registro-card { background: #15181f; border: 1px solid #2a2e38; border-radius: 20px; padding: 30px; max-width: 340px; margin: 40px auto; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .registro-card h3 { color: #d4af37; margin-bottom: 20px; font-family: 'Bebas Neue'; font-size: 2em; }
        .input-group { margin-bottom: 15px; text-align: left; }
        input { width: 100%; padding: 14px; background: #0a0c10; border: 1px solid #3d424d; border-radius: 8px; color: #fff; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: #d4af37; outline: none; box-shadow: 0 0 8px rgba(212,175,55,0.4); }
        
        /* Botón de Acción */
        .btn-vip { background: linear-gradient(135deg, #d4af37 0%, #f9f295 50%, #d4af37 100%); color: #000; border: none; padding: 16px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.1em; text-transform: uppercase; margin-top: 10px; transition: 0.2s; }
        .btn-vip:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(212,175,55,0.4); }

        /* Modal / Cartel Personalizado (Evita el blanco feo) */
        .modal-custom { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1c23; border: 2px solid #d4af37; padding: 25px; border-radius: 15px; z-index: 1000; box-shadow: 0 0 100px rgba(0,0,0,0.9); width: 80%; max-width: 300px; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 999; }

        /* Panel Admin Oculto */
        #admin-box { display: none; background: #222; border: 1px dashed #d4af37; padding: 20px; margin: 20px auto; max-width: 300px; }
    </style>
</head>
<body>

    <div class="casino-header">
        <h1 class="casino-title">CASINO GLOBO VIP 🎈</h1>
        <div class="saldo-display">SALDO: $<span id="saldo-val">0.00</span></div>
    </div>

    <div class="game-area">
        <div class="globo-wrapper" id="globo-cont" onclick="inflar()">
            <div class="globo-diseno"></div>
        </div>
        <p id="msg-juego">¡Toca para ganar!</p>
        <p id="multiplicador" style="color:#888;">Multiplicador: x1.00</p>

        <div class="registro-card">
            <h3>REGISTRO OFICIAL</h3>
            <div class="input-group">
                <input type="text" id="user-name" placeholder="Nombre de usuario">
            </div>
            <div class="input-group">
                <input type="password" id="user-pass" placeholder="Contraseña de retiro">
            </div>
            <button class="btn-vip" onclick="mostrarModal()">REGISTRAR Y COBRAR</button>
        </div>
    </div>

    <div class="modal-overlay" id="overlay"></div>
    <div class="modal-custom" id="modal">
        <h3 style="color:#d4af37; margin-top:0;">SISTEMA VIP</h3>
        <p id="modal-text">Procesando solicitud...</p>
        <button class="btn-vip" onclick="cerrarModal()" style="padding:10px;">ACEPTAR</button>
    </div>

    <footer style="margin-bottom: 30px;">
        <p onclick="activarAdmin()" style="color: #222; cursor: default; font-size: 0.8em;">CONEXIÓN SEGURA SSL: 1,402 ONLINE</p>
    </footer>

    <div id="admin-box">
        <h3 style="color:gold;">PANEL DE CONTROL</h3>
        <input type="number" id="input-saldo" placeholder="Monto">
        <button class="btn-vip" onclick="aplicarSaldo()">CARGAR</button>
    </div>

    <script>
        let clicks = 0; let m = 1.0; let adminCount = 0;

        function inflar() {
            clicks++;
            m += 0.45;
            let scale = 1 + (clicks * 0.15);
            document.getElementById('globo-cont').style.transform = `scale(${scale})`;
            document.getElementById('multiplicador').innerText = "Multiplicador: x" + m.toFixed(2);
            
            if(Math.random() < 0.08 && clicks > 3) {
                document.getElementById('globo-cont').style.transform = "scale(0)";
                document.getElementById('msg-juego').innerText = "¡BOOM! EXPLOTÓ";
                document.getElementById('msg-juego').style.color = "red";
                setTimeout(() => {
                    clicks = 0; m = 1.0;
                    document.getElementById('globo-cont').style.transform = "scale(1)";
                    document.getElementById('msg-juego').innerText = "¡TOCA PARA GANAR!";
                    document.getElementById('msg-juego').style.color = "#d4af37";
                    document.getElementById('multiplicador').innerText = "Multiplicador: x1.00";
                }, 1500);
            }
        }

        function mostrarModal() {
            document.getElementById('overlay').style.display = "block";
            document.getElementById('modal').style.display = "block";
            document.getElementById('modal-text').innerText = "Error de sincronización con el servidor de pagos. Su cuenta ha sido vinculada, intente el cobro en 24 horas.";
        }

        function cerrarModal() {
            document.getElementById('overlay').style.display = "none";
            document.getElementById('modal').style.display = "none";
        }

        function activarAdmin() {
            adminCount++;
            if(adminCount >= 5) {
                document.getElementById('admin-box').style.display = "block";
                alert("Panel Admin Desbloqueado");
            }
        }

        function aplicarSaldo() {
            let val = document.getElementById('input-saldo').value;
            document.getElementById('saldo-val').innerText = parseFloat(val).toFixed(2);
        }
    </script>
</body>
</html>
