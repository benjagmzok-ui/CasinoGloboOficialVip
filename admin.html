<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PANEL CONTROL VIP</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --oro: #d4af37; --fondo: #0a0a0a; --tarjeta: #151515; }
        body { background: var(--fondo); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; }
        
        .header { text-align: center; padding: 20px 0; border-bottom: 2px solid var(--oro); margin-bottom: 20px; }
        .header h1 { margin: 0; color: var(--oro); font-size: 1.8rem; text-transform: uppercase; }

        /* Buscador */
        .search-box { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #333; background: #000; color: white; margin-bottom: 20px; box-sizing: border-box; font-size: 1rem; }

        /* Tarjeta de Usuario */
        .usuario-card { background: var(--tarjeta); border-radius: 15px; padding: 20px; margin-bottom: 15px; border-left: 5px solid var(--oro); box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .info-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .nombre { font-size: 1.2rem; font-weight: bold; color: var(--oro); }
        .saldo-actual { font-size: 1.1rem; color: #00ff00; background: rgba(0,255,0,0.1); padding: 5px 10px; border-radius: 8px; }

        /* Controles de Saldo */
        .controles { display: grid; grid-template-columns: 1fr auto; gap: 10px; }
        .input-monto { padding: 12px; border-radius: 8px; border: 1px solid #444; background: #000; color: #fff; font-size: 1.1rem; width: 100%; box-sizing: border-box; }
        .btn-cargar { background: var(--oro); color: black; border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.9rem; text-transform: uppercase; }
        
        #login-admin { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; }
        #panel-real { display: none; }
    </style>
</head>
<body>

    <div id="login-admin">
        <h1 style="color: var(--oro)">ACCESO ELITE</h1>
        <input type="password" id="passInput" class="search-box" style
